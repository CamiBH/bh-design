<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Component Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
      padding: 48px 24px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }

    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Base button --- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms ease, box-shadow 120ms ease, transform 80ms ease, opacity 120ms ease;
      text-decoration: none;
      white-space: nowrap;
      user-select: none;
    }

    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 2px solid #0066ff; outline-offset: 2px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    /* --- Sizes --- */
    .btn-sm  { height: 32px; padding: 0 12px; font-size: 13px; }
    .btn-md  { height: 40px; padding: 0 16px; font-size: 14px; }
    .btn-lg  { height: 48px; padding: 0 22px; font-size: 16px; }

    /* --- Variants --- */
    .btn-primary {
      background: #0066ff;
      color: #fff;
    }
    .btn-primary:hover { background: #0052cc; }

    .btn-secondary {
      background: #fff;
      color: #111;
      box-shadow: inset 0 0 0 1px #ddd;
    }
    .btn-secondary:hover { background: #f0f0f0; }

    .btn-ghost {
      background: transparent;
      color: #111;
    }
    .btn-ghost:hover { background: rgba(0,0,0,0.06); }

    .btn-danger {
      background: #e53e3e;
      color: #fff;
    }
    .btn-danger:hover { background: #c53030; }

    /* --- Icon-only --- */
    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 8px;
    }

    /* --- Loading spinner --- */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn-secondary .spinner, .btn-ghost .spinner {
      border-color: rgba(0,0,0,0.15);
      border-top-color: #333;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>Button Component</h1>

  <!-- Variants -->
  <div class="section">
    <h1>Variants</h1>
    <div class="row">
      <button class="btn btn-primary btn-md">Primary</button>
      <button class="btn btn-secondary btn-md">Secondary</button>
      <button class="btn btn-ghost btn-md">Ghost</button>
      <button class="btn btn-danger btn-md">Danger</button>
    </div>
  </div>

  <!-- Sizes -->
  <div class="section">
    <h1>Sizes</h1>
    <div class="row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary btn-md">Medium</button>
      <button class="btn btn-primary btn-lg">Large</button>
    </div>
  </div>

  <!-- With icons -->
  <div class="section">
    <h1>With Icons</h1>
    <div class="row">
      <button class="btn btn-primary btn-md">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Add item
      </button>
      <button class="btn btn-secondary btn-md">
        Download
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn btn-ghost btn-icon" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.697 3.697l1.414 1.414M12.889 12.889l1.414 1.414M3.697 14.303l1.414-1.414M12.889 5.111l1.414-1.414" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- States -->
  <div class="section">
    <h1>States</h1>
    <div class="row">
      <button class="btn btn-primary btn-md">Default</button>
      <button class="btn btn-primary btn-md" disabled>Disabled</button>
      <button class="btn btn-primary btn-md">
        <span class="spinner"></span>
        Loading
      </button>
      <button class="btn btn-secondary btn-md" disabled>Disabled</button>
      <button class="btn btn-secondary btn-md">
        <span class="spinner"></span>
        Loading
      </button>
    </div>
  </div>

</body>
</html>
